name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: current publishes package.json; patch/minor/major open a validated release PR.
        required: true
        type: choice
        options:
          - current
          - patch
          - minor
          - major
      source_sha:
        description: Exact merged release source; automation only, normally left blank.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare ${{ inputs.bump }} release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      ready: ${{ steps.release.outputs.ready }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Require the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "::error::Run releases from $DEFAULT_BRANCH, not $GITHUB_REF_NAME"
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Select trusted release source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if [ -z "$SOURCE_SHA" ]; then
            exit 0
          fi
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Release source must be a full commit SHA"
            exit 1
          fi
          if ! git cat-file -e "$SOURCE_SHA^{commit}"; then
            echo "::error::Release source $SOURCE_SHA is not available"
            exit 1
          fi
          default_sha=$(git rev-parse "origin/$DEFAULT_BRANCH")
          if ! git merge-base --is-ancestor "$SOURCE_SHA" "$default_sha"; then
            echo "::error::Release source $SOURCE_SHA is not merged into $DEFAULT_BRANCH"
            exit 1
          fi
          git checkout --detach "$SOURCE_SHA"

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Select release version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          current=$(node -p "require('./package.json').version")
          if [ "$BUMP" = "current" ]; then
            version=$current
          else
            npm version "$BUMP" --no-git-tag-version --ignore-scripts
            version=$(node -p "require('./package.json').version")
          fi
          tag="v$version"

          remote_tag_sha=$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')
          if [ -z "$remote_tag_sha" ]; then
            remote_tag_sha=$(git ls-remote origin "refs/tags/$tag" | awk '{print $1}')
          fi

          registry_version_state() {
            package_name=$1
            error_file=$(mktemp)
            if npm view "${package_name}@${version}" version --json >/dev/null 2>"$error_file"; then
              rm -f "$error_file"
              echo published
            elif grep -q 'E404' "$error_file"; then
              rm -f "$error_file"
              echo missing
            else
              cat "$error_file" >&2
              rm -f "$error_file"
              return 2
            fi
          }

          if [ "$BUMP" = "current" ] && [ -n "$remote_tag_sha" ]; then
            if [ -n "$SOURCE_SHA" ] && [ "$remote_tag_sha" != "$SOURCE_SHA" ]; then
              echo "::error::$tag points at $remote_tag_sha, expected merged release source $SOURCE_SHA"
              exit 1
            fi
            git checkout --detach "$remote_tag_sha"
            tagged_version=$(node -p "require('./package.json').version")
            if [ "$tagged_version" != "$version" ]; then
              echo "::error::$tag contains package version $tagged_version, expected $version"
              exit 1
            fi
            echo "Reusing $tag at $remote_tag_sha"
          elif [ -n "$remote_tag_sha" ]; then
            echo "::error::$tag already exists; rerun with bump=current"
            exit 1
          else
            published_packages=()
            for package_name in hvir-workbench hvir-linux-x64 hvir-linux-arm64 hvir-darwin-arm64; do
              state=$(registry_version_state "$package_name")
              if [ "$state" = "published" ]; then
                published_packages+=("$package_name")
              fi
            done
            if [ "${#published_packages[@]}" -gt 0 ]; then
              echo "::error::$tag is missing, but version $version already exists for: ${published_packages[*]}"
              echo "Restore the original tag or choose a new version; refusing to retag different source."
              exit 1
            fi
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          {
            echo "### hvir $version"
            echo
            echo "Version: $current -> $version ($BUMP)"
          } >> "$GITHUB_STEP_SUMMARY"

      - run: npm ci
      - run: npm run verify
      - run: xvfb-run -a npm run smoke

      - name: Prepare pull request or publish release source
        id: release
        env:
          BUMP: ${{ inputs.bump }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$BUMP" != "current" ]; then
            node scripts/prepare-release-pr.mjs "$VERSION"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            sha=$(git rev-parse HEAD)
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "sha=$sha" >> "$GITHUB_OUTPUT"
            echo "Release source: $sha" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-platforms:
    needs: prepare
    if: needs.prepare.outputs.ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: hvir-linux-x64
            os: ubuntu-24.04
            command: npm run pack:npm:linux:x64
            smoke: xvfb-run -a npm run smoke:packaged
          - package: hvir-linux-arm64
            os: ubuntu-24.04-arm
            command: npm run pack:npm:linux:arm64
            smoke: xvfb-run -a npm run smoke:packaged
          - package: hvir-darwin-arm64
            os: macos-15
            command: npm run pack:npm:mac:arm64
            smoke: npm run smoke:packaged
    name: Build ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      HVIR_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - run: ${{ matrix.command }}
      - run: npm run pack:npm:launcher
      - run: ${{ matrix.smoke }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}
          path: dist/npm/${{ matrix.package }}-${{ needs.prepare.outputs.version }}.tgz
          if-no-files-found: error
          retention-days: 1

  publish-npm:
    name: Publish npm packages
    needs:
      - prepare
      - build-platforms
    if: needs.prepare.outputs.ready == 'true'
    runs-on: ubuntu-24.04
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Create or verify release tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          remote_tag_sha=$(git ls-remote origin "refs/tags/$TAG^{}" | awk '{print $1}')
          if [ -z "$remote_tag_sha" ]; then
            remote_tag_sha=$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')
          fi

          if [ -n "$remote_tag_sha" ] && [ "$remote_tag_sha" != "$RELEASE_SHA" ]; then
            echo "::error::$TAG points at $remote_tag_sha, expected $RELEASE_SHA"
            exit 1
          fi

          if [ -z "$remote_tag_sha" ]; then
            git tag "$TAG" "$RELEASE_SHA"
            git push origin "$TAG"
          else
            echo "$TAG already exists at $RELEASE_SHA"
          fi

      - uses: actions/download-artifact@v8
        with:
          pattern: hvir-*
          path: dist/npm
          merge-multiple: true

      - run: npm run pack:npm:launcher

      - name: Publish platform payloads
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          registry_version_state() {
            package_name=$1
            error_file=$(mktemp)
            if npm view "${package_name}@${VERSION}" version --json >/dev/null 2>"$error_file"; then
              rm -f "$error_file"
              echo published
            elif grep -q 'E404' "$error_file"; then
              rm -f "$error_file"
              echo missing
            else
              cat "$error_file" >&2
              rm -f "$error_file"
              return 2
            fi
          }

          publish_if_missing() {
            package_name=$1
            tarball="dist/npm/${package_name}-${VERSION}.tgz"
            if [ ! -f "$tarball" ]; then
              echo "::error::Missing tarball for ${package_name}@${VERSION}"
              exit 1
            fi
            state=$(registry_version_state "$package_name")
            if [ "$state" = "published" ]; then
              echo "${package_name}@${VERSION} already published"
            else
              npm publish "$tarball" --access public --provenance
            fi
          }

          publish_if_missing hvir-linux-x64
          publish_if_missing hvir-linux-arm64
          publish_if_missing hvir-darwin-arm64

      - name: Publish hvir-workbench launcher
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          registry_version_state() {
            error_file=$(mktemp)
            if npm view "hvir-workbench@${VERSION}" version --json >/dev/null 2>"$error_file"; then
              rm -f "$error_file"
              echo published
            elif grep -q 'E404' "$error_file"; then
              rm -f "$error_file"
              echo missing
            else
              cat "$error_file" >&2
              rm -f "$error_file"
              return 2
            fi
          }

          tarball="dist/npm/hvir-workbench-${VERSION}.tgz"
          if [ ! -f "$tarball" ]; then
            echo "::error::Missing launcher tarball $tarball"
            exit 1
          fi
          state=$(registry_version_state)
          if [ "$state" = "published" ]; then
            echo "hvir-workbench@${VERSION} already published"
          else
            npm publish "$tarball" --access public --provenance
          fi
    env:
      HVIR_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}

  publish-github-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - publish-npm
    if: needs.prepare.outputs.ready == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create or publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft=false \
              --latest
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$TAG" \
              --generate-notes \
              --latest
          fi
