name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'epic/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verification (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run policy, type, and test verification
        run: npm run verify

  electron-smoke:
    name: Electron smoke (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # PRs default to a depth-1 detached merge ref. The Git smoke exercises
          # branch-point behavior and therefore needs the base branch topology.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run production Electron workflow
        run: xvfb-run -a npm run smoke

  capacity-smoke:
    name: Capacity smoke (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Capacity currently runs after the production smoke workflow, whose
          # Git checks need the base branch rather than a depth-1 merge ref.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run Electron capacity probe
        run: xvfb-run -a npm run smoke:capacity

  packaged-smoke:
    name: Packaged smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            build: npm run pack:npm:linux:x64
            smoke: xvfb-run -a npm run smoke:packaged
          - name: Linux arm64
            os: ubuntu-24.04-arm
            build: npm run pack:npm:linux:arm64
            smoke: xvfb-run -a npm run smoke:packaged
          - name: macOS arm64
            os: macos-15
            build: npm run pack:npm:mac:arm64
            smoke: npm run smoke:packaged
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build platform package
        run: ${{ matrix.build }}

      - name: Build launcher package
        run: npm run pack:npm:launcher

      - name: Smoke installed packages
        run: ${{ matrix.smoke }}
