name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'epic/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verification (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # The architecture ratchet compares against its named baseline commit.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run policy, type, and test verification
        run: npm run verify

  electron-smoke:
    name: Electron smoke (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run production Electron workflow
        run: xvfb-run -a npm run smoke

  capacity-smoke:
    name: Capacity contracts + performance evidence (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run capacity contracts and collect performance evidence
        run: xvfb-run -a npm run smoke:capacity

  macos-electron-smoke:
    name: Electron correctness + capacity evidence (macOS arm64)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run focused unpackaged Electron scenarios
        run: npm run smoke:macos

      - name: Run capacity contracts and collect performance evidence
        run: npm run smoke:capacity

  packaged-smoke:
    name: Packaged smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            build: npm run pack:npm:linux:x64
            smoke: xvfb-run -a npm run smoke:packaged
          - name: Linux arm64
            os: ubuntu-24.04-arm
            build: npm run pack:npm:linux:arm64
            smoke: xvfb-run -a npm run smoke:packaged
          - name: macOS arm64
            os: macos-15
            build: npm run pack:npm:mac:arm64
            smoke: npm run smoke:packaged
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build platform package
        run: ${{ matrix.build }}

      - name: Build launcher package
        run: npm run pack:npm:launcher

      - name: Smoke installed packages
        run: ${{ matrix.smoke }}

  native-linux-package:
    name: Native package acceptance (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            build: npm run pack:linux:x64
            artifact: dist/hvir_*_amd64.deb
          - name: Linux arm64
            os: ubuntu-24.04-arm
            build: npm run pack:linux:arm64
            artifact: dist/hvir_*_arm64.deb
    env:
      HVIR_LINUX_PACKAGE_ACCEPTANCE: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build native package
        run: ${{ matrix.build }}

      - name: Install, update, launch, and remove native package
        run: xvfb-run -a npm run smoke:linux:installed

      - name: Retain accepted native package
        uses: actions/upload-artifact@v7
        with:
          name: hvir-${{ matrix.name }}-deb
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
