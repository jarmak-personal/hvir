appId: dev.hvir.app
productName: hvir
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
# Native modules (node-pty) must be rebuilt against Electron's ABI. electron-builder
# runs this automatically during packaging; it is not needed for `electron-vite dev`.
npmRebuild: true
linux:
  target:
    - dir
  category: Development
